<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bimo // 私人同人存档</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div class="bg-grid"></div>
    <canvas id="mg-canvas"></canvas>

    <header class="top-bar glass">
        <div class="brand-zone">
            <span class="logo-dot"></span>
            <h1 class="app-name">bimo</h1>
        </div>
        
        <div class="top-search-box">
            <i class="ri-search-line"></i>
            <input type="text" id="global-search" placeholder="输入关键词、作者、CP、TAG..." oninput="handleGlobalSearch()">
        </div>

        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <i class="ri-moon-line" id="theme-icon"></i>
        </button>
    </header>

    <main class="app-viewport">
        
        <section id="view-home" class="view-panel active">
            <div class="stats-container">
                <div class="stat-bubble glass">
                    <span class="num" id="stat-total">0</span>
                    <span class="lbl">已封存</span>
                </div>
                <div class="stat-bubble glass">
                    <span class="num" id="stat-fandoms">0</span>
                    <span class="lbl">多圈历程</span>
                </div>
                <div class="stat-bubble glass">
                    <span class="num" id="stat-lost">0</span>
                    <span class="lbl">全网孤本</span>
                </div>
            </div>
            
            <div class="view-title">最近入库 & 重温</div>
            <div id="recent-list" class="cards-stack"></div>
        </section>

        <section id="view-search" class="view-panel">
            <div class="view-title">全局搜索结果</div>
            <div id="search-results-list" class="cards-stack"></div>
        </section>

        <section id="view-fandoms" class="view-panel">
            <div class="view-title">圈子 / 配对索引</div>
            <div id="fandoms-tree-container"></div>
        </section>

        <section id="view-progress" class="view-panel">
            <div class="view-title">追更状态主控</div>
            <div class="progress-tabs">
                <button class="p-tab active" onclick="filterProgress('连载')">连载中</button>
                <button class="p-tab" onclick="filterProgress('完结')">已完结</button>
                <button class="p-tab" onclick="filterProgress('弃坑')">原作者弃坑</button>
                <button class="p-tab" onclick="filterProgress('孤本')">孤本/已蒸发</button>
            </div>
            <div id="progress-list" class="cards-stack" style="margin-top: 15px;"></div>
        </section>

        <section id="view-backup" class="view-panel">
            <div class="view-title">数据管理 / 迁移</div>
            <div class="backup-box glass">
                <p class="status-text">> LOCAL_STORAGE: ACTIVE</p>
                <p class="info-text">所有数据均独立存在当前浏览器中。换设备或清理缓存前，请务必执行备份。</p>
                
                <div class="backup-buttons">
                    <button class="action-btn-pill primary" onclick="exportDataVault()">
                        <i class="ri-download-cloud-line"></i> 导出全量备份 (.json)
                    </button>
                    <label class="action-btn-pill">
                        <i class="ri-upload-cloud-line"></i> 导入备份文件
                        <input type="file" id="import-file-input" accept=".json" onchange="importDataVault()" style="display:none;">
                    </label>
                </div>
            </div>
        </section>

    </main>

    <button class="floating-add-btn" onclick="openArchiveModal()">
        <i class="ri-add-line"></i>
    </button>

    <nav class="bottom-tabbar glass">
        <button class="tab-item active" onclick="switchView('home', this)">
            <i class="ri-home-5-line"></i><span>主页</span>
        </button>
        <button class="tab-item" onclick="switchView('search', this)">
            <i class="ri-search-eye-line"></i><span>搜索</span>
        </button>
        <button class="tab-item" onclick="switchView('fandoms', this)">
            <i class="ri-folder-shield-2-line"></i><span>圈子</span>
        </button>
        <button class="tab-item" onclick="switchView('progress', this)">
            <i class="ri-compass-3-line"></i><span>进度</span>
        </button>
        <button class="tab-item" onclick="switchView('backup', this)">
            <i class="ri-database-2-line"></i><span>备份</span>
        </button>
    </nav>

    <div class="modal-overlay" id="archive-modal">
        <div class="modal-window glass">
            <div class="modal-header">
                <h2>作品封装入档</h2>
                <button class="modal-close-btn" onclick="closeArchiveModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="field-box">
                    <label>作品原址 URL</label>
                    <input type="text" id="form-url" placeholder="粘贴网址" oninput="autoDetectPlatform()">
                </div>
                <div class="field-grid">
                    <div class="field-box">
                        <label>作品标题</label>
                        <input type="text" id="form-title" placeholder="">
                    </div>
                    <div class="field-box">
                        <label>识别平台</label>
                        <input type="text" id="form-platform" placeholder="">
                    </div>
                </div>
                <div class="field-grid">
                    <div class="field-box">
                        <label>创作者 (太太)</label>
                        <input type="text" id="form-author" placeholder="">
                    </div>
                    <div class="field-box">
                        <label>体裁</label>
                        <select id="form-type">
                            <option value="文">文</option>
                            <option value="画">画</option>
                            <option value="视频">视频</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <div class="field-grid">
                    <div class="field-box">
                        <label>所属圈子</label>
                        <input type="text" id="form-fandom" placeholder="">
                    </div>
                    <div class="field-box">
                        <label>CP / 配对角色</label>
                        <input type="text" id="form-cp" placeholder="">
                    </div>
                </div>
                <div class="field-grid">
                    <div class="field-box">
                        <label>生存/阅读状态</label>
                        <select id="form-status">
                            <option value="完结">已完结</option>
                            <option value="连载">连载中</option>
                            <option value="弃坑">原作者弃坑</option>
                            <option value="孤本">孤本(已删/销号)</option>
                        </select>
                    </div>
                    <div class="field-box">
                        <label>体量 (选填)</label>
                        <input type="text" id="form-size" placeholder="如: 5w字 / 4P">
                    </div>
                </div>
                <div class="field-box">
                    <label>自定义标签 (用空格或逗号隔开)</label>
                    <input type="text" id="form-tags" placeholder="萌点，若为雷点请加“雷:”前缀">
                </div>
                <div class="field-box">
                    <label>碎碎念 / 核心看点 / 摘要长评</label>
                    <textarea id="form-comment" rows="5" placeholder="在此记录你的阅读碎碎念、剧情高能点或防丢备份摘要..."></textarea>
                </div>
                <input type="hidden" id="form-edit-id">
                <button class="submit-btn" onclick="submitEncapsulation()">封 存 入 档</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
