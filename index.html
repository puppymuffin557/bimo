<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE.LOG // 私人同人极客存档</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div class="bg-grid-overlay"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="logo-dot"></span>
                <h2>ARCHIVE.LOG</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('dashboard')">
                    <i class="ri-dashboard-3-line"></i> 仪表盘
                </button>
                <button class="nav-btn" onclick="switchTab('repository')">
                    <i class="ri-folder-zip-line"></i> 藏品库
                </button>
                <button class="nav-btn" onclick="switchTab('backup')">
                    <i class="ri-terminal-box-line"></i> 终极备份
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="action-trigger theme-toggle" onclick="toggleTheme()">
                    <i class="ri-moon-clear-line" id="theme-icon"></i> <span>深色模式</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            
            <section id="mod-dashboard" class="mod-section active">
                <div class="section-header">
                    <h3>DASHBOARD // 数据概览</h3>
                </div>
                <div class="matrix-grid">
                    <div class="matrix-card">
                        <div class="card-glow"></div>
                        <span class="matrix-label">已封存藏品</span>
                        <span class="matrix-value" id="stat-total">0</span>
                    </div>
                    <div class="matrix-card">
                        <div class="card-glow"></div>
                        <span class="matrix-label">观测圈子数</span>
                        <span class="matrix-value" id="stat-fandoms">0</span>
                    </div>
                    <div class="matrix-card">
                        <div class="card-glow"></div>
                        <span class="matrix-label">抢救性孤本</span>
                        <span class="matrix-value" id="stat-saved">0</span>
                    </div>
                </div>

                <div class="recent-panel">
                    <h4>RECENTLY // 最近重温与入库</h4>
                    <div id="recent-list" class="recent-list"></div>
                </div>
            </section>

            <section id="mod-repository" class="mod-section">
                <div class="section-header">
                    <h3>REPOSITORY // 圈子索引</h3>
                    <div class="search-wrapper">
                        <i class="ri-search-eye-line"></i>
                        <input type="text" id="search-input" placeholder="跨圈搜索标题/作者/CP/萌雷点TAG..." oninput="renderRepository()">
                    </div>
                </div>
                <div id="repo-tree" class="repo-tree"></div>
            </section>

            <section id="mod-backup" class="mod-section">
                <div class="section-header">
                    <h3>DATA MANAGEMENT // 数据主控</h3>
                </div>
                <div class="terminal-box">
                    <p class="terminal-line">> STATUS: LOCALSTORAGE_ACTIVE</p>
                    <p class="terminal-line">> INFO: 本站为全隔离私人工作台，不经过任何服务器，数据绝对安全。</p>
                    <div class="terminal-actions">
                        <button class="cyber-btn" onclick="exportJSON()">
                            <i class="ri-download-2-line"></i> 导出全量加密存档 (.json)
                        </button>
                        <label class="cyber-btn file-label">
                            <i class="ri-upload-2-line"></i> 导入历史全局存档
                            <input type="file" id="import-file" accept=".json" onchange="importJSON()" style="display:none;">
                        </label>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <button class="floating-trigger" onclick="openArchiveModal()">
        <i class="ri-add-line"></i>
    </button>

    <div class="modal" id="archive-modal">
        <div class="modal-blur" onclick="closeArchiveModal()"></div>
        <div class="modal-window">
            <div class="modal-header">
                <h4><i class="ri-git-repository-private-line"></i> ENCAPSULATION // 作品入档封装</h4>
                <button class="close-btn" onclick="closeArchiveModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="input-row">
                    <label>原发网址 (URL)</label>
                    <input type="text" id="in-url" placeholder="粘贴 AO3, LOFTER, X, 微博 等链接" oninput="handleUrlAutoFill()">
                </div>
                <div class="input-group-2">
                    <div class="input-row">
                        <label>作品标题</label>
                        <input type="text" id="in-title" placeholder="如：那件疯狂的小事">
                    </div>
                    <div class="input-row">
                        <label>源平台</label>
                        <input type="text" id="in-platform" placeholder="自动识别">
                    </div>
                </div>
                <div class="input-group-2">
                    <div class="input-row">
                        <label>创作太太</label>
                        <input type="text" id="in-author" placeholder="作者名/ID">
                    </div>
                    <div class="input-row">
                        <label>体裁类型</label>
                        <select id="in-type">
                            <option value="文">文字 (Text)</option>
                            <option value="画">画作/图集 (Illustration)</option>
                            <option value="视频">视频剪辑 (Video)</option>
                            <option value="其他">其他周边/谷美</option>
                        </select>
                    </div>
                </div>
                <div class="input-group-2">
                    <div class="input-row">
                        <label>所属圈子 (Fandom)</label>
                        <input type="text" id="in-fandom" placeholder="如：诡秘之主">
                    </div>
                    <div class="input-row">
                        <label>CP / 配对角色</label>
                        <input type="text" id="in-cp" placeholder="如：克伦 (无CP填无)">
                    </div>
                </div>
                <div class="input-group-2">
                    <div class="input-row">
                        <label>生存状态</label>
                        <select id="in-status">
                            <option value="完结">已完结</option>
                            <option value="连载">连载中</option>
                            <option value="弃坑">原作者已弃坑</option>
                            <option value="孤本">【考古级】原帖已删/原作者销号</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>容量体量 (选填)</label>
                        <input type="text" id="in-size" placeholder="例: 15w字 / 3P / 5分钟">
                    </div>
                </div>
                <div class="input-row">
                    <label>同人标签 (用逗号或空格分隔)</label>
                    <input type="text" id="in-tags" placeholder="萌点如: HE, 强强；雷点请加“雷:”前缀如: 雷:生子">
                </div>
                <div class="input-row">
                    <label>私人留存短评 / 进度提示 / 名场面备忘</label>
                    <textarea id="in-comment" rows="4" placeholder="深夜读完此篇的碎碎念……或者：已经用TXT备份了全文，防止走丢。"></textarea>
                </div>
                <input type="hidden" id="in-id">
                <button class="submit-cyber-btn" onclick="executeEncapsulation()">
                    <span>CORE_ENCAPSULATION // 执行封装</span>
                </button>
            </div>
        </div>
    </div>

    <div class="zen-viewer" id="zen-viewer">
        <div class="zen-header">
            <button class="zen-close" onclick="closeZenMode()"><i class="ri-arrow-left-line"></i> 返回库</button>
            <span class="zen-meta-top" id="zen-meta-platform">AO3</span>
        </div>
        <div class="zen-container">
            <h1 class="zen-title" id="zen-title">作品标题</h1>
            <div class="zen-meta-line">
                <span>BY: <strong id="zen-author">太太名</strong></span>
                <span>FANDOM: <span id="zen-fandom">圈子</span></span>
                <span>CP: <span id="zen-cp">配对</span></span>
                <span>STATUS: <span id="zen-status">状态</span></span>
            </div>
            <div class="zen-tags" id="zen-tags"></div>
            <div class="zen-divider"></div>
            <div class="zen-content" id="zen-comment">
                </div>
            <div class="zen-footer-link">
                <a id="zen-original-url" href="#" target="_blank"><i class="ri-link-m"></i> 访问原平台浏览作品</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
